name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_POKEMON_API_KEY: ${{ secrets.VITE_POKEMON_API_KEY }}
          # GitHub Pages sirve el sitio desde /pokemonPruebaAPI/, no desde la raíz.
          VITE_BASE_PATH: /pokemonPruebaAPI/

      - name: SPA fallback for GitHub Pages
        # GitHub Pages sirve contenido estático: una URL profunda (ej. /cards/base1-4)
        # no existe como archivo real. Copiar index.html a 404.html hace que GitHub
        # Pages lo devuelva para cualquier ruta no encontrada, y React Router toma el
        # control desde ahí (mostrando la ruta real o nuestra página 404 si corresponde).
        run: cp dist/index.html dist/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
